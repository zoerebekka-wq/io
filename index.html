<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Clinic</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

html,
body{
  width:100%;
  overflow-x:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#fff;
}

/* HERO */
.hero{
  width:100%;
  height:100vh;
  height:100svh;
  background-image:url("https://images.squarespace-cdn.com/content/v1/6941333f600b1450049ae995/0c7547d6-b408-4d25-bc26-dec63a8b7987/Screenshot+2026-04-30+at+3.24.47%E2%80%AFPM.png?format=750w");
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  position:relative;
}

/* BUTTON */
.book-btn{
  position:absolute;
  left:50%;
  bottom:38px;
  transform:translateX(-50%);
  text-decoration:none;
  color:#ffffff;
  font-size:18px;
  letter-spacing:0.16em;
  font-weight:500;
  white-space:nowrap;
  z-index:5;
}

/* BOOKING */
.booking{
  width:100%;
  padding:100px 24px;
  background:linear-gradient(
    180deg,
    #edf5fa 0%,
    #dde9f1 50%,
    #f7fbfd 100%
  );
}

/* TITLE */
.booking-title{
  width:100%;
  text-align:center;
  margin-bottom:40px;
  font-size:28px;
  letter-spacing:0.18em;
  color:#647a86;
}

/* CALENDLY */
.calendly-wrapper{
  width:100%;
  max-width:1200px;
  margin:0 auto;
  border-radius:42px;
  overflow:hidden;
  background:#ffffff;
  box-shadow:0 25px 80px rgba(0,0,0,0.08);
}

.calendly-wrapper iframe{
  width:100%;
  height:850px;
  border:none;
  display:block;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media screen and (max-width:768px){

  /* HERO FIX */
  .hero{
    height:72vh;
    min-height:72vh;
    background-size:cover;
    background-position:center top;
  }

  /* BUTTON FIX */
  .book-btn{
    bottom:18px;
    font-size:11px;
    letter-spacing:0.08em;
  }

  /* SECTION FIX */
  .booking{
    padding:42px 10px 55px;
  }

  /* TITLE FIX */
  .booking-title{
    font-size:16px;
    margin-bottom:20px;
    letter-spacing:0.08em;
  }

  /* CALENDLY FIX */
  .calendly-wrapper{
    width:100%;
    border-radius:22px;
  }

  .calendly-wrapper iframe{
    height:1100px;
  }

}

/* ========================= */
/* SMALLER PHONES */
/* ========================= */

@media screen and (max-width:430px){

  .hero{
    height:66vh;
    min-height:66vh;
    background-position:center top;
  }

  .book-btn{
    font-size:10px;
    bottom:14px;
  }

  .booking{
    padding:34px 6px 45px;
  }

  .booking-title{
    font-size:14px;
  }

  .calendly-wrapper{
    border-radius:18px;
  }

  .calendly-wrapper iframe{
    height:1180px;
  }

}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <a href="#book" class="book-btn">
    ΚΛΕΙΣΤΕ ΡΑΝΤΕΒΟΥ
  </a>
</section>

<!-- BOOKING -->
<section id="book" class="booking">

  <div class="booking-title">
    ΚΛΕΙΣΤΕ ΡΑΝΤΕΒΟΥ
  </div>

  <div class="calendly-wrapper">
    <iframe src="https://calendly.com/astarterad/30min"></iframe>
  </div>

</section>

<!-- TIDIO -->
<script src="//code.tidio.co/drtxmrtijuzcj8jred1fxhwcr3j5k03u.js" async></script>

</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clinic</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* HERO */
.hero {
  width: 100%;
  height: 100vh;
  background-image: url("https://images.squarespace-cdn.com/content/v1/6941333f600b1450049ae995/0c7547d6-b408-4d25-bc26-dec63a8b7987/Screenshot+2026-04-30+at+3.24.47%E2%80%AFPM.png?format=750w");
  background-size: cover;
  background-position: center;
  position: relative;
}

/* BUTTON */
.book-btn {
  position: absolute;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%);
  text-decoration: none;
  color: #ffffff;
  font-size: clamp(18px, 2vw, 28px);
  letter-spacing: 0.18em;
  font-weight: 500;
}

/* BOOKING SECTION */
.booking {
  padding: 120px 20px;
  background: linear-gradient(
    180deg,
    #eef4f7 0%,
    #e3edf3 50%,
    #f5f9fc 100%
  );
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TITLE */
.booking-title {
  text-align: center;
  margin-bottom: 50px;
  font-size: clamp(18px, 4vw, 28px);
  letter-spacing: 0.2em;
  color: #5e7480;
}

/* CALENDLY CONTAINER */
.calendly-wrapper {
  width: 100%;
  max-width: 1100px;
  border-radius: 40px;
  overflow: hidden;
  background: #ffffff;
  box-shadow: 0 30px 80px rgba(0,0,0,0.08);
}

/* IFRAME */
.calendly-wrapper iframe {
  width: 100%;
  height: 850px;
  border: none;
  display: block;
}

/* MOBILE */
@media (max-width: 768px) {
  .booking {
    padding: 80px 15px;
  }

  .calendly-wrapper {
    border-radius: 28px;
  }

  .calendly-wrapper iframe {
    height: 900px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <a href="#book" class="book-btn">ΚΛΕΙΣΤΕ ΡΑΝΤΕΒΟΥ</a>
</section>

<!-- BOOKING -->
<section id="book" class="booking">

  <div class="booking-title">ΚΛΕΙΣΤΕ ΡΑΝΤΕΒΟΥ</div>

  <div class="calendly-wrapper">
    <iframe src="https://calendly.com/astarterad/30min"></iframe>
  </div>

</section>

<!-- TIDIO -->
<script src="//code.tidio.co/drtxmrtijuzcj8jred1fxhwcr3j5k03u.js" async></script>

</body>
</html>
